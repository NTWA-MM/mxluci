# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the
# command line, check the gradle.properties file in the project root folder.
# When configured as property files ending in '.properties', values will be read from the left to the
# right, and the first existing property file takes precedence.
# For more details on how to configure your build environment visit
# http://www.gradle.org/configure-your-build

# Enables namespacing of each library's R class.
# We recommend enabling this for all projects. However, this requires upgrading
# to a higher minimum SDK version.
android.nonTransitiveRClass=true

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# The Kotlin version to use with this project.
org.jetbrains.kotlin.version=1.9.23

# Gradle memory configuration
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
